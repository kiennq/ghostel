name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emacs_version:
          - '27.2'
          - '29.4'
          - 'snapshot'
    steps:
      - uses: actions/checkout@v4
      - uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs_version }}

      - name: Byte-compile
        run: |
          emacs --batch -Q -L . \
            -f batch-byte-compile \
            ghostel.el ghostel-debug.el

      - name: Checkdoc
        run: |
          output=$(emacs --batch -Q -L . \
            --eval "(require 'checkdoc)" \
            --eval "(checkdoc-file \"ghostel.el\")" 2>&1)
          echo "$output"
          if echo "$output" | grep -q "Warning"; then
            exit 1
          fi

      - name: Package-lint
        run: |
          emacs --batch -Q \
            --eval "(progn
                      (require 'package)
                      (push '(\"melpa\" . \"https://melpa.org/packages/\") package-archives)
                      (package-initialize)
                      (package-refresh-contents)
                      (package-install 'package-lint))" \
            -L . \
            -f package-lint-batch-and-exit \
            ghostel.el

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emacs_version:
          - '27.2'
          - '29.4'
          - 'snapshot'
    steps:
      - uses: actions/checkout@v4
      - uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs_version }}

      - name: Run pure Elisp tests
        run: |
          emacs --batch -Q -L . \
            -l test/ghostel-test.el \
            -f ghostel-test-run-elisp

  build-native:
    # Ghostel itself requires Zig 0.14+, but building the vendored
    # ghostty submodule (libghostty-vt) requires Zig >= 0.15.2.
    # CI uses Zig 0.15.1 with "zig build check" which compiles our
    # module source against headers without linking the ghostty
    # static libraries.  Switch to ./build.sh once Zig >= 0.15.2
    # is available as a stable release.
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: x86_64-linux
          - os: macos-latest
            platform: aarch64-macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          persist-credentials: true

      - name: Rewrite SSH to HTTPS for submodules
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule sync --recursive
          git submodule update --init --recursive

      - uses: purcell/setup-emacs@master
        with:
          version: '29.4'

      - name: Find Emacs module header
        run: |
          set -e
          EMACS_BIN="$(command -v emacs || true)"
          HEADER=""

          # Check directories relative to the Emacs binary first
          if [ -n "$EMACS_BIN" ]; then
            EMACS_BIN_DIR="$(dirname "$EMACS_BIN")"
            for dir in "$EMACS_BIN_DIR/../include" "$EMACS_BIN_DIR/../share/emacs/include"; do
              if [ -f "$dir/emacs-module.h" ]; then
                HEADER="$(cd "$dir" && pwd)/emacs-module.h"
                break
              fi
            done

            # Nix-installed Emacs: follow the symlink to the store path
            if [ -z "$HEADER" ] && [ -L "$EMACS_BIN" ]; then
              REAL_DIR="$(dirname "$(readlink -f "$EMACS_BIN")")"
              for dir in "$REAL_DIR/../include" "$REAL_DIR/../../include"; do
                if [ -f "$dir/emacs-module.h" ]; then
                  HEADER="$(cd "$dir" && pwd)/emacs-module.h"
                  break
                fi
              done
            fi
          fi

          # Fallback: common system paths
          if [ -z "$HEADER" ]; then
            for dir in /usr/include /usr/local/include /opt/homebrew/include; do
              FOUND="$(find "$dir" -maxdepth 5 -name emacs-module.h -print -quit 2>/dev/null || true)"
              if [ -n "$FOUND" ]; then
                HEADER="$FOUND"
                break
              fi
            done
          fi

          if [ -z "$HEADER" ]; then
            echo "::error::emacs-module.h not found"
            exit 1
          fi
          echo "EMACS_INCLUDE_DIR=$(dirname "$HEADER")" >> "$GITHUB_ENV"
          echo "Found emacs-module.h at: $HEADER"

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - name: Compile native module (check only)
        run: |
          # Full linking requires pre-built libghostty-vt (needs Zig >= 0.15.2).
          # "zig build check" compiles all Zig source against headers without linking.
          zig build check
