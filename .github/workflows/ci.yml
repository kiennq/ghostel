name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emacs_version:
          - '28.2'
          - '29.4'
          - 'snapshot'
    steps:
      - uses: actions/checkout@v4
      - uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs_version }}

      - name: Byte-compile
        run: |
          emacs --batch -Q -L lisp \
            --eval "(setq byte-compile-error-on-warn t)" \
            -f batch-byte-compile \
            lisp/ghostel.el lisp/ghostel-compile.el \
            lisp/ghostel-debug.el lisp/ghostel-eshell.el

      - name: Install fish
        run: sudo apt-get install -y fish
      - name: Run pure Elisp tests
        run: |
          emacs --batch -Q -L lisp \
            -l ert \
            -l test/ghostel-test.el \
            -f ghostel-test-run-elisp

  test-evil:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emacs_version:
          - '29.4'
          - 'snapshot'
    steps:
      - uses: actions/checkout@v4
      - uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs_version }}

      - name: Install evil
        run: |
          git clone --depth 1 https://github.com/emacs-evil/evil.git /tmp/evil

      - name: Run evil-ghostel tests
        run: |
          emacs --batch -Q -L /tmp/evil -L lisp -L extensions/evil-ghostel \
            -l ert \
            -l test/evil-ghostel-test.el \
            -f evil-ghostel-test-run-elisp

  build-native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: x86_64-linux
            suffix: .so
          - os: windows-latest
            platform: x86_64-windows
            target: x86_64-windows-gnu
            suffix: .dll
          - os: macos-latest
            platform: aarch64-macos
            suffix: .dylib
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build native module
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ matrix.target }}" ]; then
            zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseFast -Dcpu=baseline
          else
            zig build -Doptimize=ReleaseFast -Dcpu=baseline
          fi

      - name: Upload Windows module artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ghostel-module-${{ matrix.platform }}
          path: |
            zig-out/bin/dyn-loader-module${{ matrix.suffix }}
            zig-out/bin/ghostel-module${{ matrix.suffix }}
            zig-out/bin/ghostel-module.json
            zig-out/bin/conpty-module${{ matrix.suffix }}
            zig-out/bin/conpty-module.json

      - name: Upload module artifact
        if: matrix.os != 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ghostel-module-${{ matrix.platform }}
          path: |
            zig-out/bin/dyn-loader-module${{ matrix.suffix }}
            zig-out/bin/ghostel-module${{ matrix.suffix }}
            zig-out/bin/ghostel-module.json

  test-native:
    needs: build-native
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: x86_64-linux
            suffix: .so
            emacs_version: '29.4'
          - os: ubuntu-latest
            platform: x86_64-linux
            suffix: .so
            emacs_version: 'snapshot'
          - os: macos-latest
            platform: aarch64-macos
            suffix: .dylib
            emacs_version: '29.4'
          - os: macos-latest
            platform: aarch64-macos
            suffix: .dylib
            emacs_version: 'snapshot'
          - os: windows-latest
            platform: x86_64-windows
            suffix: .dll
            emacs_version: 'snapshot'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: purcell/setup-emacs@master
        if: runner.os != 'Windows'
        with:
          version: ${{ matrix.emacs_version }}
      - uses: jcs090218/setup-emacs@master
        if: runner.os == 'Windows'
        with:
          version: ${{ matrix.emacs_version }}

      - name: Install zsh and fish
        if: runner.os == 'Linux'
        run: sudo apt-get install -y zsh fish

      - name: Download native module
        uses: actions/download-artifact@v4
        with:
          name: ghostel-module-${{ matrix.platform }}

      - name: Verify downloaded artifacts (Unix)
        if: runner.os != 'Windows'
        run: ls -la dyn-loader-module* ghostel-module*

      - name: Verify downloaded artifacts (Windows)
        if: runner.os == 'Windows'
        run: Get-ChildItem -Filter "*module*" | Format-Table Name, Length

      - name: Run native module tests
        shell: bash
        run: |
          emacs --batch -Q -L lisp \
            -l ert \
            -l ghostel.el \
            -l test/ghostel-test.el \
            --eval "(ghostel--initialize-native-modules)" \
            -f ghostel-test-run-native
