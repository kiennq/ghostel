name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  byte-compile:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emacs_version:
          - '28.2'
          - '29.4'
          - 'snapshot'
    steps:
      - uses: actions/checkout@v4
      - uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs_version }}

      - name: Install compat
        run: git clone --depth 1 https://github.com/emacs-compat/compat.git /tmp/compat

      - name: Byte-compile
        run: |
          make -j$(getconf _NPROCESSORS_ONLN) \
            EMACSFLAGS="-L /tmp/compat" \
            byte-compile

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: purcell/setup-emacs@master
        with:
          version: '29.4'

      - name: Run package-lint, checkdoc, docquotes
        # `make package-lint' self-provisions its deps (package-lint +
        # a local ghostel install) into an isolated package-user-dir.
        run: make package-lint checkdoc docquotes

  test-zig:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Run pure-Zig unit tests
        run: zig build test

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emacs_version:
          - '28.2'
          - '29.4'
          - 'snapshot'
    steps:
      - uses: actions/checkout@v4
      - uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs_version }}

      - name: Install fish
        run: sudo apt-get install -y fish

      - name: Install compat
        run: git clone --depth 1 https://github.com/emacs-compat/compat.git /tmp/compat

      - name: Run pure Elisp tests
        run: |
          make -j$(getconf _NPROCESSORS_ONLN) \
            EMACSFLAGS="-L /tmp/compat" \
            test

  test-evil:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emacs_version:
          - '29.4'
          - 'snapshot'
    steps:
      - uses: actions/checkout@v4
      - uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs_version }}

      - name: Install evil
        run: |
          git clone --depth 1 https://github.com/emacs-evil/evil.git /tmp/evil

      - name: Install compat
        run: git clone --depth 1 https://github.com/emacs-compat/compat.git /tmp/compat

      - name: Run evil-ghostel tests
        run: |
          emacs --batch -Q -L /tmp/compat -L /tmp/evil -L lisp -L extensions/evil-ghostel \
            -l ert \
            -l test/evil-ghostel-test.el \
            -f evil-ghostel-test-run

  build-native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: x86_64-linux
            suffix: .so
          # macOS builds are disabled until Zig 0.15.2 works reliably on
          # GitHub's macos-26 arm64 runner image.
          # - os: macos-latest
          #   platform: aarch64-macos
          #   suffix: .dylib
          # - os: macos-latest
          #   platform: x86_64-macos
          #   suffix: .dylib
          #   target: x86_64-macos
          - os: ubuntu-latest
            platform: aarch64-linux
            suffix: .so
            target: aarch64-linux-gnu
          - os: ubuntu-latest
            platform: x86_64-freebsd
            suffix: .so
            target: x86_64-freebsd
          - os: windows-latest
            platform: x86_64-windows
            suffix: .dll
            target: x86_64-windows-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build native module
        shell: bash
        run: |
          if [ -n "${{ matrix.target }}" ]; then
            zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseFast -Dcpu=baseline
          else
            zig build -Doptimize=ReleaseFast -Dcpu=baseline
          fi

      - name: Upload module artifact
        uses: actions/upload-artifact@v4
        with:
          name: ghostel-module-${{ matrix.platform }}
          path: |
            zig-out/bin/*${{ matrix.suffix }}
            zig-out/bin/*.json
            zig-out/bin/*.version

  test-native:
    needs: build-native
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: x86_64-linux
            suffix: .so
            emacs_version: '29.4'
          - os: ubuntu-latest
            platform: x86_64-linux
            suffix: .so
            emacs_version: 'snapshot'
          # macOS native tests are disabled with macOS build artifacts.
          # - os: macos-latest
          #   platform: aarch64-macos
          #   suffix: .dylib
          #   emacs_version: '29.4'
          # - os: macos-latest
          #   platform: aarch64-macos
          #   suffix: .dylib
          #   emacs_version: 'snapshot'
          - os: windows-latest
            platform: x86_64-windows
            suffix: .dll
            emacs_version: 'snapshot'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: purcell/setup-emacs@master
        if: runner.os != 'Windows'
        with:
          version: ${{ matrix.emacs_version }}
      - uses: jcs090218/setup-emacs@master
        if: runner.os == 'Windows'
        with:
          version: ${{ matrix.emacs_version }}

      - name: Install zsh and fish
        if: runner.os == 'Linux'
        run: sudo apt-get install -y zsh fish

      - name: Download native module
        uses: actions/download-artifact@v4
        with:
          name: ghostel-module-${{ matrix.platform }}
          path: zig-out/bin

      - name: Install compat
        shell: bash
        run: git clone --depth 1 https://github.com/emacs-compat/compat.git "$RUNNER_TEMP/compat"

      - name: Run native module tests
        shell: bash
        run: |
          find test -maxdepth 1 -name 'ghostel-*-test.el' -print | sort | while IFS= read -r file; do
            printf '  NATIVE  %s\n' "${file##*/}"
            emacs --batch -Q -L "$RUNNER_TEMP/compat" -L lisp -L test \
              --eval '(setq ghostel-module-directory (expand-file-name "zig-out/bin" default-directory))' \
              -l ert \
              -l test/ghostel-test-helpers.el \
              -l "$file" \
              --eval "(ert-run-tests-batch-and-exit '(tag native))"
          done

  test-hypothesis-cases:
    needs: build-native
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: purcell/setup-emacs@master
        with:
          version: '29.4'

      - name: Download native module
        uses: actions/download-artifact@v4
        with:
          name: ghostel-module-x86_64-linux

      - name: Mark pre-built module as up-to-date
        run: touch ghostel-module.so

      - name: Install compat
        run: git clone --depth 1 https://github.com/emacs-compat/compat.git /tmp/compat

      - name: Install Hypothesis test dependencies
        run: python3 -m pip install -r test/hypothesis/requirements.txt

      - name: Run saved Hypothesis regression cases
        run: |
          make EMACSFLAGS="-L /tmp/compat" test-hypothesis-cases
