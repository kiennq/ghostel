name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  byte-compile:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            emacs_version: '27.2'
          - os: ubuntu-latest
            emacs_version: '29.4'
          - os: ubuntu-latest
            emacs_version: 'snapshot'
          - os: windows-latest
            emacs_version: '29.4'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs_version }}

      - name: Byte-compile
        run: |
          emacs --batch -Q -L . \
            --eval "(setq byte-compile-error-on-warn t)" \
            -f batch-byte-compile \
            ghostel.el ghostel-debug.el

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emacs_version:
          - '27.2'
          - '29.4'
          - 'snapshot'
    steps:
      - uses: actions/checkout@v4
      - uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs_version }}

      - name: Run pure Elisp tests
        run: |
          emacs --batch -Q -L . \
            -l ert \
            -l test/ghostel-test.el \
            -f ghostel-test-run-elisp

  build-native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: x86_64-linux
            target: x86_64-linux-gnu
            suffix: .so
          - os: windows-latest
            platform: x86_64-windows
            target: x86_64-windows-gnu
            suffix: .dll
          - os: macos-latest
            platform: aarch64-macos
            target: aarch64-macos
            suffix: .dylib
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          persist-credentials: true

      - name: Rewrite SSH to HTTPS for submodules
        shell: bash
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule sync --recursive
          git submodule update --init --recursive

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build vendored libghostty-vt
        shell: bash
        run: |
          set -euo pipefail
          (cd vendor/ghostty && zig build -Dtarget=${{ matrix.target }} -Demit-lib-vt=true -Doptimize=ReleaseFast)

      - name: Stage static dependency libraries
        shell: bash
        run: |
          set -euo pipefail

          case "${{ matrix.os }}" in
            windows-latest) static_lib_ext=".lib" ;;
            *) static_lib_ext=".a" ;;
          esac

          search_dirs=("vendor/ghostty/.zig-cache")
          [ -n "${ZIG_LOCAL_CACHE_DIR:-}" ] && search_dirs+=("${ZIG_LOCAL_CACHE_DIR}")
          [ -n "${ZIG_GLOBAL_CACHE_DIR:-}" ] && search_dirs+=("${ZIG_GLOBAL_CACHE_DIR}")

          find_static_lib() {
            local base="$1"
            local dir
            local matches=()
            for dir in "${search_dirs[@]}"; do
              [ -d "$dir" ] || continue
              while IFS= read -r match; do
                matches+=("$match")
              done < <(find "$dir" \( -name "${base}${static_lib_ext}" -o -name "lib${base}.a" \) -print 2>/dev/null)
            done

            if [ "${#matches[@]}" -eq 0 ]; then
              return 1
            fi

            ls -1t -- "${matches[@]}" | head -n 1
          }

          copy_static_lib() {
            local source="$1"
            local dest_base="$2"
            local dest="vendor/ghostty/zig-out/lib/${dest_base}${static_lib_ext}"
            cp "$source" "$dest"
            echo "  ${dest_base}${static_lib_ext} <- $source"
          }

          simdutf="$(find_static_lib simdutf)"
          highway="$(find_static_lib highway)"
          copy_static_lib "$simdutf" "simdutf"
          copy_static_lib "$highway" "highway"

      - name: Build native module
        shell: bash
        run: |
          set -euo pipefail
          zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseFast

      - name: Upload module artifact
        uses: actions/upload-artifact@v4
        with:
          name: ghostel-module-${{ matrix.platform }}
          path: ghostel-module${{ matrix.suffix }}
