name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  byte-compile:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emacs_version:
          - '28.2'
          - '29.4'
          - 'snapshot'
    steps:
      - uses: actions/checkout@v4
      - uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs_version }}

      - name: Byte-compile
        run: |
          emacs --batch -Q -L . \
            --eval "(setq byte-compile-error-on-warn t)" \
            -f batch-byte-compile \
            ghostel.el ghostel-debug.el

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emacs_version:
          - '28.2'
          - '29.4'
          - 'snapshot'
    steps:
      - uses: actions/checkout@v4
      - uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs_version }}

      - name: Run pure Elisp tests
        run: |
          emacs --batch -Q -L . \
            -l ert \
            -l test/ghostel-test.el \
            -f ghostel-test-run-elisp

  build-native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: x86_64-linux
            suffix: .so
          - os: macos-latest
            platform: aarch64-macos
            suffix: .dylib
          - os: macos-latest
            platform: x86_64-macos
            suffix: .dylib
            target: x86_64-macos
          - os: ubuntu-latest
            platform: aarch64-linux
            suffix: .so
            target: aarch64-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          persist-credentials: true

      - name: Rewrite SSH to HTTPS for submodules
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule sync --recursive
          git submodule update --init --recursive

      - uses: purcell/setup-emacs@master
        with:
          version: '29.4'

      - name: Find Emacs module header
        run: |
          set -e
          EMACS_BIN="$(command -v emacs || true)"
          HEADER=""

          if [ -n "$EMACS_BIN" ]; then
            EMACS_BIN_DIR="$(dirname "$EMACS_BIN")"
            for dir in "$EMACS_BIN_DIR/../include" "$EMACS_BIN_DIR/../share/emacs/include"; do
              if [ -f "$dir/emacs-module.h" ]; then
                HEADER="$(cd "$dir" && pwd)/emacs-module.h"
                break
              fi
            done

            if [ -z "$HEADER" ] && [ -L "$EMACS_BIN" ]; then
              REAL_DIR="$(dirname "$(readlink -f "$EMACS_BIN")")"
              for dir in "$REAL_DIR/../include" "$REAL_DIR/../../include"; do
                if [ -f "$dir/emacs-module.h" ]; then
                  HEADER="$(cd "$dir" && pwd)/emacs-module.h"
                  break
                fi
              done
            fi
          fi

          if [ -z "$HEADER" ]; then
            for dir in /usr/include /usr/local/include /opt/homebrew/include; do
              FOUND="$(find "$dir" -maxdepth 5 -name emacs-module.h -print -quit 2>/dev/null || true)"
              if [ -n "$FOUND" ]; then
                HEADER="$FOUND"
                break
              fi
            done
          fi

          if [ -z "$HEADER" ]; then
            echo "::error::emacs-module.h not found"
            exit 1
          fi
          echo "EMACS_INCLUDE_DIR=$(dirname "$HEADER")" >> "$GITHUB_ENV"
          echo "Found emacs-module.h at: $HEADER"

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build native module
        run: |
          if [ -n "${{ matrix.target }}" ]; then
            ./build.sh -t "${{ matrix.target }}"
          else
            ./build.sh
          fi

      - name: Upload module artifact
        uses: actions/upload-artifact@v4
        with:
          name: ghostel-module-${{ matrix.platform }}
          path: ghostel-module${{ matrix.suffix }}
