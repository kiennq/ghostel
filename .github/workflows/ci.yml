name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emacs_version:
          - '28.2'
          - '29.4'
          - 'snapshot'
    steps:
      - uses: actions/checkout@v4
      - uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs_version }}

      - name: Byte-compile
        run: |
          emacs --batch -Q -L . \
            --eval "(setq byte-compile-error-on-warn t)" \
            -f batch-byte-compile \
            ghostel.el ghostel-debug.el

      - name: Run pure Elisp tests
        run: |
          emacs --batch -Q -L . \
            -l ert \
            -l test/ghostel-test.el \
            -f ghostel-test-run-elisp

  build-native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: x86_64-linux
            target: x86_64-linux-gnu
            suffix: .so
          - os: windows-latest
            platform: x86_64-windows
            target: x86_64-windows-gnu
            suffix: .dll
          - os: macos-latest
            platform: aarch64-macos
            target: aarch64-macos
            suffix: .dylib
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          persist-credentials: true

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build native module
        shell: bash
        run: |
          set -euo pipefail
          zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseFast

      - name: Upload Windows module artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ghostel-module-${{ matrix.platform }}
          path: |
            zig-out/bin/ghostel-module${{ matrix.suffix }}
            zig-out/bin/conpty-module${{ matrix.suffix }}

      - name: Upload module artifact
        if: matrix.os != 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ghostel-module-${{ matrix.platform }}
          path: zig-out/bin/ghostel-module${{ matrix.suffix }}
