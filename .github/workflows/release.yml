name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      should_release: ${{ steps.version.outputs.should_release }}
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest release
        continue-on-error: true
        id: cur_release
        uses: pozetroninc/github-action-get-latest-release@master
        with:
          repository: ${{ github.repository }}
          excludes: draft

      - name: Determine version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          base_ver="$(grep -Po '^;; Version: \K[\d.]+' ghostel.el)"
          sha="${GITHUB_SHA::6}"
          should_release=true
          latest_tag=$([[ "${{ steps.cur_release.outcome }}" == "failure" ]] && echo "" || echo "${{ steps.cur_release.outputs.release }}")

            if [[ -n "$latest_tag" ]] && git rev-parse -q --verify "refs/tags/$latest_tag" >/dev/null; then
              if git diff --quiet "$latest_tag"...HEAD -- \
                ghostel.el \
                build.zig \
                build.zig.zon \
                include \
                src \
                vendor/ghostty
            then
              should_release=false
            fi
          fi

          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
            version="${tag#v}"
          else
            version="${base_ver}.${GITHUB_RUN_NUMBER}.${sha}"
            tag="v${version}"
          fi

          echo "should_release=${should_release}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Create release
        if: steps.version.outputs.should_release == 'true'
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: prepare-release
    if: needs.prepare-release.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: x86_64-linux
            target: x86_64-linux-gnu
            suffix: .so
          - os: windows-latest
            platform: x86_64-windows
            target: x86_64-windows-gnu
            suffix: .dll
          - os: macos-latest
            platform: aarch64-macos
            target: aarch64-macos
            suffix: .dylib
    runs-on: ${{ matrix.os }}
    env:
      ZIG_GLOBAL_CACHE_DIR: ${{ github.workspace }}/.zig-global-cache
      ZIG_LOCAL_CACHE_DIR: ${{ github.workspace }}/.zig-cache
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: false
          persist-credentials: false

      - name: Rewrite SSH to HTTPS for submodules
        shell: bash
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule sync --recursive
          git submodule update --init --recursive

      - name: Cache Zig build state
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ZIG_GLOBAL_CACHE_DIR }}
            ${{ env.ZIG_LOCAL_CACHE_DIR }}
            vendor/ghostty/.zig-cache
          key: release-${{ runner.os }}-${{ matrix.platform }}-${{ hashFiles('build.zig', 'build.zig.zon', 'src/**', 'include/**', '.github/workflows/release.yml') }}
          restore-keys: |
            release-${{ runner.os }}-${{ matrix.platform }}-

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build vendored libghostty-vt
        shell: bash
        run: |
          set -euo pipefail
          (cd vendor/ghostty && zig build -Dtarget=${{ matrix.target }} -Demit-lib-vt=true -Doptimize=ReleaseFast)

      - name: Stage static dependency libraries
        shell: bash
        run: |
          set -euo pipefail

          case "${{ matrix.os }}" in
            windows-latest) static_lib_ext=".lib" ;;
            *) static_lib_ext=".a" ;;
          esac

          search_dirs=("vendor/ghostty/.zig-cache")
          [ -n "${ZIG_LOCAL_CACHE_DIR:-}" ] && search_dirs+=("${ZIG_LOCAL_CACHE_DIR}")
          [ -n "${ZIG_GLOBAL_CACHE_DIR:-}" ] && search_dirs+=("${ZIG_GLOBAL_CACHE_DIR}")

          find_static_lib() {
            local base="$1"
            local dir
            local matches=()
            for dir in "${search_dirs[@]}"; do
              [ -d "$dir" ] || continue
              while IFS= read -r match; do
                matches+=("$match")
              done < <(find "$dir" \( -name "${base}${static_lib_ext}" -o -name "lib${base}.a" \) -print 2>/dev/null)
            done

            if [ "${#matches[@]}" -eq 0 ]; then
              return 1
            fi

            ls -1t -- "${matches[@]}" | head -n 1
          }

          copy_static_lib() {
            local source="$1"
            local dest_base="$2"
            local dest="vendor/ghostty/zig-out/lib/${dest_base}${static_lib_ext}"
            cp "$source" "$dest"
            echo "  ${dest_base}${static_lib_ext} <- $source"
          }

          simdutf="$(find_static_lib simdutf)"
          highway="$(find_static_lib highway)"
          copy_static_lib "$simdutf" "simdutf"
          copy_static_lib "$highway" "highway"

      - name: Build native module
        shell: bash
        run: |
          set -euo pipefail
          zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseFast

      - name: Rename artifact for release
        shell: bash
        run: |
          mv ghostel-module${{ matrix.suffix }} \
             ghostel-module-${{ matrix.platform }}${{ matrix.suffix }}

      - name: Upload artifact to release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.prepare-release.outputs.tag }}
          allowUpdates: true
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
          omitDraftDuringUpdate: true
          omitPrereleaseDuringUpdate: true
          artifacts: ghostel-module-${{ matrix.platform }}${{ matrix.suffix }}
          token: ${{ secrets.GITHUB_TOKEN }}
